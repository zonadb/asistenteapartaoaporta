<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asistente APARTAoAPORTA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0a; color: #f8fafc; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 12s linear infinite; }
        
        .glass { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .flag-btn { width: 32px; height: 32px; border-radius: 50%; transition: all 0.3s ease; overflow: hidden; border: 2px solid transparent; opacity: 0.4; filter: grayscale(0.5); }
        .flag-btn.active { border-color: #ff6600; transform: scale(1.1); opacity: 1; filter: grayscale(0); box-shadow: 0 0 15px rgba(255,102,0,0.3); }
        
        .chat-bubble-bot { background: linear-gradient(145deg, #1a1a1a, #111111); border: 1px solid rgba(255, 102, 0, 0.1); }
        .img-container { position: relative; width: 100%; overflow: hidden; border-radius: 12px 12px 0 0; background: #111; min-height: 180px; }
        .img-gradient-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 50%; background: linear-gradient(to top, rgba(17,17,17,1), transparent); }
        
        .action-btn { transition: all 0.2s ease; border: 1px solid rgba(255, 255, 255, 0.05); }
        .action-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const API_KEY = ""; 
        const WHATSAPP_NUMBER = "34617635544";
        const GITHUB_BASE = "https://raw.githubusercontent.com/zonadb/apartaoaporta-fotos/main/";

        const ASSETS = {
            playa: `${GITHUB_BASE}general%20playa%20a%205%20minutos.avif`,
            parking: `${GITHUB_BASE}general%20parking.avif`,
            piscina: `${GITHUB_BASE}general%20piscina.avif`,
            luces: `${GITHUB_BASE}general%20luces%20led.avif`,
            apto211: `${GITHUB_BASE}apto%20211%20salon.avif`,
            apto210: `${GITHUB_BASE}apto%20210%20salon.avif`
        };

        const TRANSLATIONS = {
            es: {
                welcome: "¡Hola! 👋 Soy tu asistente de APARTAoAPORTA. ¿En qué apartamento estás alojado? ✨",
                placeholder: "Escribe tu duda... 💬",
                typing: "Buscando info... 🔍",
                wifi: "WiFi 📶",
                pool: "Piscina 🏊‍♂️",
                park: "Parking 🚗",
                apto: "Apto",
                data: {
                    wifi: "📶 **WiFi:** Red: **apartaoaporta** / Clave: **2020v@leria** 🔑",
                    pool: "🏊‍♂️ **Piscina:** 10:00h a 22:00h. (Solo verano ☀️)",
                    parking: "🚗 **Parking:** Comunitario gratuito dentro del recinto. 🅿️ **Zona Azul:** GRATIS de 21:00h a 10:00h. (Al mediodía es de pago 💸)",
                    lights: "💡 **Luces:** Controla el Ambilight con los mandos pequeños junto a la TV. 🌈",
                    apto211: "🏠 **Apto 211:** Tienes LAVAVAJILLAS 🍽️ y PERSIANAS eléctricas con mando. 🌟",
                    apto210: "🏠 **Apto 210:** Tienes CHIMENEA eléctrica y Ambilight acogedor. 🔥",
                    playa: "🏖️ **Playa:** A 5 min andando. ¡Disfruta el mar! 🌊"
                }
            },
            en: {
                welcome: "Hi! 👋 I'm your APARTAoAPORTA assistant. Which apartment are you staying in? ✨",
                placeholder: "Type your question... 💬",
                typing: "Searching... 🔍",
                wifi: "WiFi 📶",
                pool: "Pool 🏊‍♂️",
                park: "Parking 🚗",
                apto: "Apt",
                data: {
                    wifi: "📶 **WiFi:** Network: **apartaoaporta** / Key: **2020v@leria** 🔑",
                    pool: "🏊‍♂️ **Pool:** 10:00 AM to 10:00 PM. (Summer only ☀️)",
                    parking: "🚗 **Parking:** Free community parking inside. 🅿️ **Blue Zone:** FREE from 9:00 PM to 10:00 AM. (Paid at noon 💸)",
                    lights: "💡 **Lights:** Control Ambilight with the small remotes next to the TV. 🌈",
                    apto211: "🏠 **Apt 211:** You have a DISHWASHER 🍽️ and electric BLINDS with remote. 🌟",
                    apto210: "🏠 **Apt 210:** You have an electric FIREPLACE and cozy Ambilight. 🔥",
                    playa: "🏖️ **Beach:** 5 min walk away. Enjoy! 🌊"
                }
            },
            fr: {
                welcome: "Salut! 👋 Je suis votre assistant APARTAoAPORTA. Dans quel appartement logez-vous? ✨",
                placeholder: "Écrivez votre question... 💬",
                typing: "Recherche... 🔍",
                wifi: "WiFi 📶",
                pool: "Piscine 🏊‍♂️",
                park: "Parking 🚗",
                apto: "Apt",
                data: {
                    wifi: "📶 **WiFi:** Réseau: **apartaoaporta** / Code: **2020v@leria** 🔑",
                    pool: "🏊‍♂️ **Piscine:** 10h00 à 22h00. (Été seulement ☀️)",
                    parking: "🚗 **Parking:** Parking communautaire gratuit à l'intérieur. 🅿️ **Zone Bleue:** GRATUIT de 21h00 à 10h00. (Payant le midi 💸)",
                    lights: "💡 **Lumières:** Contrôlez l'Ambilight avec les petites télécommandes. 🌈",
                    apto211: "🏠 **Apt 211:** Vous avez un LAVE-VAISSELLE 🍽️ et des VOLETS électriques. 🌟",
                    apto210: "🏠 **Apt 210:** Vous avez une CHEMINÉE électrique et Ambilight. 🔥",
                    playa: "🏖️ **Plage:** À 5 min à pied. Profitez-en! 🌊"
                }
            }
        };

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            const [iconContent, setIconContent] = useState(null);
            useEffect(() => { if (window.lucide && window.lucide.icons[name]) setIconContent(window.lucide.icons[name]); }, [name]);
            if (!iconContent) return <span className={className} style={{ width: size, height: size }}></span>;
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconContent.map(i => `<${i[0]} ${Object.entries(i[1]).map(([k, v]) => `${k}="${v}"`).join(' ')} />`).join('') }} />
            );
        };

        const App = () => {
            const [lang, setLang] = useState('es');
            const [apto, setApto] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [typing, setTyping] = useState(false);
            const messagesEndRef = useRef(null);
            const t = TRANSLATIONS[lang];

            useEffect(() => {
                setMessages([{ 
                    role: 'bot', 
                    content: t.welcome, 
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
                }]);
            }, [lang]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, typing]);

            const getResponse = (query) => {
                const q = query.toLowerCase();
                const d = t.data;
                if (q.includes('piscina') || q.includes('pool')) return { text: d.pool, img: ASSETS.piscina };
                if (q.includes('parking') || q.includes('azul') || q.includes('blue') || q.includes('coche') || q.includes('park')) return { text: d.parking, img: ASSETS.parking };
                if (q.includes('wifi') || q.includes('clave') || q.includes('key')) return { text: d.wifi, img: null };
                if (q.includes('luz') || q.includes('light') || q.includes('led')) return { text: d.lights, img: ASSETS.luces };
                if (q.includes('playa') || q.includes('beach') || q.includes('plage')) return { text: d.playa, img: ASSETS.playa };
                return null;
            };

            const handleSend = async (text, isAptoBtn = false) => {
                const userText = text || input;
                if (!userText.trim() || typing) return;

                setMessages(prev => [...prev, { role: 'user', content: userText, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
                setInput('');
                setTyping(true);

                let respText, respImg;

                if (isAptoBtn) {
                    const num = text.split(' ')[1];
                    setApto(num);
                    respText = num === '211' ? t.data.apto211 : (num === '210' ? t.data.apto210 : `Apto ${num} ✨`);
                    respImg = num === '211' ? ASSETS.apto211 : (num === '210' ? ASSETS.apto210 : null);
                } else {
                    const local = getResponse(userText);
                    if (local) {
                        respText = local.text;
                        respImg = local.img;
                    } else {
                        // Simulación de IA o respuesta por defecto si no hay API Key
                        respText = `🌴 APARTAoAPORTA ✨\n${t.data.wifi}\n${t.data.parking}`;
                    }
                }

                setTimeout(() => {
                    setMessages(prev => [...prev, { 
                        role: 'bot', 
                        content: respText, 
                        image: respImg,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
                    }]);
                    setTyping(false);
                }, 600);
            };

            return (
                <div className="flex flex-col h-screen max-w-xl mx-auto bg-[#0a0a0a] relative overflow-hidden shadow-2xl border-x border-white/5">
                    <header className="safe-top glass border-b border-orange-500/10 sticky top-0 z-50 px-4 py-3 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="bg-[#ff6600] p-1.5 rounded-lg shadow-lg">
                                <LucideIcon name="Sun" size={16} className="text-black animate-spin-slow" />
                            </div>
                            <h1 className="font-black text-[#ff6600] text-xs tracking-tighter uppercase">APARTAoAPORTA</h1>
                        </div>
                        <div className="flex gap-2 bg-white/5 p-1 rounded-full px-2">
                            <button onClick={() => setLang('es')} className={`flag-btn ${lang === 'es' ? 'active' : ''}`}>
                                <img src="https://flagcdn.com/w80/es.png" className="w-full h-full object-cover" />
                            </button>
                            <button onClick={() => setLang('en')} className={`flag-btn ${lang === 'en' ? 'active' : ''}`}>
                                <img src="https://flagcdn.com/w80/gb.png" className="w-full h-full object-cover" />
                            </button>
                            <button onClick={() => setLang('fr')} className={`flag-btn ${lang === 'fr' ? 'active' : ''}`}>
                                <img src="https://flagcdn.com/w80/fr.png" className="w-full h-full object-cover" />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-72">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'}`}>
                                <div className={`max-w-[88%] rounded-2xl overflow-hidden shadow-xl ${m.role === 'user' ? 'bg-[#ff6600] text-black font-bold p-3' : 'chat-bubble-bot text-slate-100'}`}>
                                    {m.image && (
                                        <div className="img-container">
                                            <img src={m.image} className="w-full h-48 object-cover" />
                                            <div className="img-gradient-overlay"></div>
                                        </div>
                                    )}
                                    <div className="p-3 text-sm whitespace-pre-wrap leading-relaxed">
                                        {m.content}
                                        <div className="text-[8px] mt-2 font-black uppercase opacity-30 tracking-widest">{m.time}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {typing && <div className="text-[9px] text-orange-500 font-black uppercase ml-4 animate-pulse">🔍 {t.typing}</div>}
                        <div ref={messagesEndRef} />
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 max-w-xl mx-auto z-40 p-4 glass border-t border-white/5 pb-12">
                        <div className="flex gap-2 mb-2 overflow-x-auto no-scrollbar">
                            {['210', '211', '212'].map(n => (
                                <button key={n} onClick={() => handleSend(`${t.apto} ${n}`, true)} className={`action-btn flex-1 py-2 px-4 rounded-xl text-[10px] font-black uppercase border whitespace-nowrap ${apto === n ? 'bg-[#ff6600] text-black border-[#ff6600]' : 'bg-white/5 text-orange-500 border-white/10'}`}>🏠 {t.apto} {n}</button>
                            ))}
                        </div>
                        <div className="flex gap-2 mb-4">
                            <button onClick={() => handleSend(t.wifi)} className="action-btn bg-white/5 border border-white/10 text-white font-bold text-[9px] px-3 py-3 rounded-xl uppercase flex-1">📶 {t.wifi}</button>
                            <button onClick={() => handleSend(t.pool)} className="action-btn bg-white/5 border border-white/10 text-white font-bold text-[9px] px-3 py-3 rounded-xl uppercase flex-1">🏊‍♂️ {t.pool}</button>
                            <button onClick={() => handleSend(t.park)} className="action-btn bg-white/5 border border-white/10 text-white font-bold text-[9px] px-3 py-3 rounded-xl uppercase flex-1">🚗 {t.park}</button>
                            <button onClick={() => window.open(`https://wa.me/${WHATSAPP_NUMBER}`)} className="action-btn bg-green-600 text-white font-black text-[9px] px-3 py-3 rounded-xl uppercase flex items-center justify-center gap-1.5 shadow-lg"><LucideIcon name="MessageCircle" size={14} /> WhatsApp</button>
                        </div>
                        <div className="flex gap-2 items-center bg-black border border-white/10 rounded-2xl p-1 px-3 shadow-inner">
                            <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSend()} placeholder={t.placeholder} className="flex-1 bg-transparent py-4 text-sm outline-none text-white placeholder-white/20" />
                            <button onClick={() => handleSend()} className="bg-[#ff6600] text-black p-3 rounded-xl"><LucideIcon name="Send" size={16} /></button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
