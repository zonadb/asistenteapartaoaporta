<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asistente APARTAoAPORTA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0a; color: #f8fafc; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 12s linear infinite; }
        
        .glass { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .flag-btn { width: 28px; height: 28px; border-radius: 50%; transition: all 0.3s ease; overflow: hidden; border: 1.5px solid transparent; opacity: 0.4; }
        .flag-btn.active { border-color: #ff6600; transform: scale(1.1); opacity: 1; }
        
        .chat-bubble-bot { background: linear-gradient(145deg, #1a1a1a, #111111); border: 1px solid rgba(255, 102, 0, 0.1); }
        .img-container { position: relative; width: 100%; overflow: hidden; border-radius: 12px 12px 0 0; background: #111; }
        .img-gradient-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 40%; background: linear-gradient(to top, rgba(17,17,17,1), transparent); }
        
        .action-btn { transition: all 0.2s ease; border: 1px solid rgba(255, 255, 255, 0.05); }
        .action-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const API_KEY = ""; 
        const WHATSAPP_NUMBER = "34617635544";
        const GITHUB_BASE = "https://raw.githubusercontent.com/zonadb/apartaoaporta-fotos/main/";

        const ASSETS = {
            playa: `${GITHUB_BASE}general%20playa%20a%205%20minutos.avif`,
            mapa: `${GITHUB_BASE}general%20mapa.avif`,
            parking: `${GITHUB_BASE}general%20parking.avif`,
            piscina: `${GITHUB_BASE}general%20piscina.avif`,
            luces: `${GITHUB_BASE}general%20luces%20led.avif`,
            apto211: `${GITHUB_BASE}apto%20211%20salon.avif`,
            apto210: `${GITHUB_BASE}apto%20210%20salon.avif`
        };

        const DATA_FIXED = {
            checkIn: "14:00h 🕑",
            checkOut: "11:00h 🕚",
            wifiRed: "apartaoaporta 📶",
            wifiClave: "2020v@leria 🔑",
            pool: "10:00h a 22:00h 🏊‍♂️ (abierta en temporada de verano ☀️)",
            parking: "Parking comunitario exterior gratuito 🚗 dentro del recinto (según disponibilidad).",
            luces: "Las luces LED se controlan con los mandos pequeños junto a la TV 💡. ¡Dale color a tu estancia!",
            location: "En Cap Salou, a solo 5 min andando de la playa de La Pineda 🏖️."
        };

        const TRANSLATIONS = {
            es: { welcome: "¡Hola! 👋 Soy tu asistente de APARTAoAPORTA. ¿En qué puedo ayudarte hoy? ✨", wifi: "WiFi 📶", beach: "Playa 🏖️", map: "Mapa 📍", contact: "WhatsApp", placeholder: "Escribe tu duda aquí... 💬", apto: "Apto", typing: "Buscando info... 🔍", pool: "Piscina 🏊‍♂️", park: "Parking 🚗" },
            ca: { welcome: "Hola! 👋 Sóc el teu assistent. En què et puc ajudar avui? ✨", wifi: "WiFi 📶", beach: "Platja 🏖️", map: "Mapa 📍", contact: "WhatsApp", placeholder: "Escriu el teu dubte... 💬", apto: "Apto", typing: "Buscant info... 🔍", pool: "Piscina 🏊‍♂️", park: "Pàrquing 🚗" },
            en: { welcome: "Hi! 👋 I'm your assistant. How can I help you today? ✨", wifi: "WiFi 📶", beach: "Beach 🏖️", map: "Map 📍", contact: "WhatsApp", placeholder: "Type your question... 💬", apto: "Apt", typing: "Thinking... 🔍", pool: "Pool 🏊‍♂️", park: "Parking 🚗" },
            fr: { welcome: "Salut ! 👋 Je suis votre assistant. Comment puis-je vous aider ? ✨", wifi: "WiFi 📶", beach: "Plage 🏖️", map: "Carte 📍", contact: "WhatsApp", placeholder: "Votre question... 💬", apto: "Appt", typing: "Recherche... 🔍", pool: "Piscine 🏊‍♂️", park: "Parking 🚗" }
        };

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            const [iconContent, setIconContent] = useState(null);
            useEffect(() => { if (window.lucide && window.lucide.icons[name]) setIconContent(window.lucide.icons[name]); }, [name]);
            if (!iconContent) return <span className={className} style={{ width: size, height: size }}></span>;
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconContent.map(i => `<${i[0]} ${Object.entries(i[1]).map(([k, v]) => `${k}="${v}"`).join(' ')} />`).join('') }} />
            );
        };

        const App = () => {
            const [lang, setLang] = useState('es');
            const [apto, setApto] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [typing, setTyping] = useState(false);
            const messagesEndRef = useRef(null);
            const t = TRANSLATIONS[lang];

            useEffect(() => {
                setMessages([{ role: 'bot', content: t.welcome, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
            }, [lang]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, typing]);

            const getLocalResponse = (query) => {
                const q = query.toLowerCase();
                if (q.includes('piscina')) return { text: `🏊‍♂️ **Piscina:**\n${DATA_FIXED.pool}\n¡No olvides la crema solar! 🧴`, img: ASSETS.piscina };
                if (q.includes('parking') || q.includes('coche') || q.includes('aparc')) return { text: `🚗 **Parking:**\n${DATA_FIXED.parking}\nEntra con el coche y busca sitio libre. 🅿️`, img: ASSETS.parking };
                if (q.includes('luz') || q.includes('luces') || q.includes('led')) return { text: `💡 **Luces LED:**\n${DATA_FIXED.luces}\n¡Crea el ambiente perfecto! 🌈`, img: ASSETS.luces };
                if (q.includes('wifi')) return { text: `📶 **WiFi:**\nRed: **${DATA_FIXED.wifiRed}**\nClave: **${DATA_FIXED.wifiClave}**\n¡Conéctate y disfruta! 🌐`, img: null };
                if (q.includes('playa')) return { text: `🌊 **Playa:**\n${DATA_FIXED.location}\n¡Ideal para un chapuzón! 👙`, img: ASSETS.playa };
                if (q.includes('mapa')) return { text: `📍 **Ubicación:**\nCalle de la torre alta, 6, Salou.\n¡Te esperamos! 🏠`, img: ASSETS.mapa };
                return null;
            };

            const askGemini = async (query) => {
                const prompt = `Eres el asistente super amable de APARTAoAPORTA. 
                USA MUCHOS EMOJIS RELACIONADOS CON VACACIONES Y HOGAR. 🌴🏠☀️
                DATOS CLAVE: Piscina (${DATA_FIXED.pool}), Parking (${DATA_FIXED.parking}), Luces (mandos junto a TV 💡), WiFi (${DATA_FIXED.wifiClave}).
                Apto 211 (Tiene Lavavajillas 🍽️ y persianas automáticas 🎛️), Apto 210 (Tiene Chimenea 🪵).
                Responde de forma muy breve y alegre en ${lang}.`;
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: query }] }], systemInstruction: { parts: [{ text: prompt }] } })
                    });
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) { return null; }
            };

            const handleSend = async (text, isApto = false) => {
                const userText = text || input;
                if (!userText.trim() || typing) return;

                if (isApto) setApto(text.split(' ')[1]);
                
                setMessages(prev => [...prev, { role: 'user', content: userText, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
                setInput('');
                setTyping(true);

                const local = getLocalResponse(userText);
                let responseText = local ? local.text : await askGemini(userText);
                let responseImg = local ? local.img : null;

                if (!responseImg) {
                    const lowRes = (responseText || "").toLowerCase();
                    if (lowRes.includes('piscina')) responseImg = ASSETS.piscina;
                    else if (lowRes.includes('parking')) responseImg = ASSETS.parking;
                    else if (lowRes.includes('luz') || lowRes.includes('led')) responseImg = ASSETS.luces;
                    else if (lowRes.includes('playa')) responseImg = ASSETS.playa;
                }

                if (isApto) {
                    responseText = `¡Genial! ✨ Ya sé que estás en el **Apto ${text.split(' ')[1]}**. ¿En qué puedo ayudarte hoy? 😊`;
                    responseImg = text.includes('211') ? ASSETS.apto211 : ASSETS.apto210;
                }

                setMessages(prev => [...prev, { 
                    role: 'bot', 
                    content: responseText || "Ups, no estoy seguro... 🤔 Pulsa WhatsApp y te ayudo en un momento. 📲", 
                    image: responseImg,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
                }]);
                setTyping(false);
            };

            return (
                <div className="flex flex-col h-screen max-w-xl mx-auto bg-[#0a0a0a] relative overflow-hidden shadow-2xl">
                    <header className="safe-top glass border-b border-orange-500/10 sticky top-0 z-50 px-4 py-3 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="bg-[#ff6600] p-1.5 rounded-lg shadow-lg shadow-orange-600/20">
                                <LucideIcon name="Sun" size={16} className="text-black animate-spin-slow" />
                            </div>
                            <h1 className="font-black text-[#ff6600] text-xs tracking-tighter uppercase">APARTAoAPORTA</h1>
                        </div>
                        <div className="flex gap-1.5 bg-white/5 p-1 rounded-full border border-white/5">
                            {['es','ca','en','fr'].map(l => (
                                <button key={l} onClick={() => setLang(l)} className={`flag-btn ${lang === l ? 'active' : ''}`}>
                                    <img src={`https://flagcdn.com/w80/${l==='en'?'gb':l==='ca'?'es-ct':l}.png`} className="w-full h-full object-cover" />
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-64">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'}`}>
                                <div className={`max-w-[88%] rounded-2xl overflow-hidden shadow-xl ${m.role === 'user' ? 'bg-[#ff6600] text-black font-semibold p-3' : 'chat-bubble-bot text-slate-200'}`}>
                                    {m.image && (
                                        <div className="img-container">
                                            <img src={m.image} className="w-full h-48 object-cover" alt="Visual" />
                                            <div className="img-gradient-overlay"></div>
                                        </div>
                                    )}
                                    <div className="p-3 text-sm whitespace-pre-wrap leading-relaxed">
                                        {m.content}
                                        <div className="text-[8px] mt-1.5 font-bold uppercase opacity-25 tracking-widest">{m.time}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {typing && <div className="text-[9px] text-orange-500/50 font-bold uppercase ml-4 animate-pulse flex items-center gap-2">🔍 {t.typing}</div>}
                        <div ref={messagesEndRef} />
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 max-w-xl mx-auto z-40 p-3 glass border-t border-white/5 pb-10">
                        <div className="flex gap-2 mb-2 overflow-x-auto no-scrollbar">
                            {['210', '211', '212'].map(n => (
                                <button key={n} onClick={() => handleSend(`${t.apto} ${n}`, true)} className={`action-btn flex-1 py-2 rounded-xl text-[10px] font-black uppercase border ${apto === n ? 'bg-[#ff6600] text-black border-[#ff6600]' : 'bg-white/5 text-orange-500 border-white/10'}`}>🏠 {t.apto} {n}</button>
                            ))}
                        </div>
                        <div className="flex gap-2 mb-3">
                            <button onClick={() => handleSend('wifi')} className="action-btn bg-white/5 border border-white/10 text-white font-bold text-[9px] px-3 py-2.5 rounded-xl uppercase flex-1">{t.wifi}</button>
                            <button onClick={() => handleSend('piscina')} className="action-btn bg-white/5 border border-white/10 text-white font-bold text-[9px] px-3 py-2.5 rounded-xl uppercase flex-1">{t.pool}</button>
                            <button onClick={() => handleSend('parking')} className="action-btn bg-white/5 border border-white/10 text-white font-bold text-[9px] px-3 py-2.5 rounded-xl uppercase flex-1">{t.park}</button>
                            <button onClick={() => window.open(`https://wa.me/${WHATSAPP_NUMBER}`)} className="action-btn bg-green-600 text-white font-black text-[9px] px-3 py-2.5 rounded-xl uppercase flex items-center justify-center gap-1.5 shadow-lg active:bg-green-500"><LucideIcon name="MessageCircle" size={14} /> {t.contact}</button>
                        </div>
                        <div className="flex gap-2 items-center bg-black/40 border border-white/5 rounded-2xl p-1 px-3 shadow-inner">
                            <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSend()} placeholder={t.placeholder} className="flex-1 bg-transparent py-3 text-sm outline-none text-white placeholder-white/20" />
                            <button onClick={() => handleSend()} className="bg-[#ff6600] text-black p-2.5 rounded-xl active:scale-95 transition-transform"><LucideIcon name="Send" size={16} /></button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
