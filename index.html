<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APARTAoAPORTA - Asistente Virtual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .bot-bubble { border-radius: 20px 20px 20px 0px; }
        .user-bubble { border-radius: 20px 20px 0px 20px; }
        .typing-dot { animation: typing 1s infinite ease-in-out; }
        @keyframes typing { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-10">

    <!-- PANTALLA INICIAL: SELECCIÓN -->
    <div id="selector-screen" class="min-h-screen flex flex-col items-center justify-center p-6 gradient-bg text-white text-center">
        <h1 class="text-5xl font-black mb-4 tracking-tighter">APARTAoAPORTA</h1>
        <p class="mb-10 text-blue-100 text-lg italic">¿En qué apartamento te alojas?</p>
        <div class="grid grid-cols-1 gap-4 w-full max-w-xs">
            <button onclick="initApp('210')" class="bg-white text-blue-900 font-black py-5 rounded-2xl shadow-2xl text-2xl active:scale-95 transition">Loft 210</button>
            <button onclick="initApp('211')" class="bg-white text-blue-900 font-black py-5 rounded-2xl shadow-2xl text-2xl active:scale-95 transition">Loft 211</button>
            <button onclick="initApp('212')" class="bg-white text-blue-900 font-black py-5 rounded-2xl shadow-2xl text-2xl active:scale-95 transition">Loft 212</button>
        </div>
    </div>

    <!-- APP PRINCIPAL CON CHATBOT IA -->
    <div id="main-app" class="hidden flex flex-col min-h-screen bg-white">
        
        <!-- Cabecera -->
        <header class="gradient-bg text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center border border-white/30">
                    <i class="fas fa-robot text-xl"></i>
                </div>
                <div>
                    <h2 class="font-black text-lg leading-none">Asistente Virtual</h2>
                    <p id="apt-status" class="text-[10px] text-blue-200 uppercase font-bold mt-1"></p>
                </div>
            </div>
            <select id="lang-selector" onchange="updateLanguage()" class="bg-blue-800 text-xs font-bold border-none rounded-lg px-2 py-1 focus:outline-none">
                <option value="es">🇪🇸 ES</option>
                <option value="en">🇬🇧 EN</option>
                <option value="fr">🇫🇷 FR</option>
                <option value="ca">⚽ CA</option>
            </select>
        </header>

        <!-- Contenedor del Chat -->
        <div id="chat-window" class="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-50 min-h-[400px]">
            <!-- Mensaje de Bienvenida IA -->
            <div class="flex flex-col items-start">
                <div class="bg-blue-600 text-white p-4 bot-bubble shadow-md max-w-[85%] text-sm">
                    <p id="welcome-msg">¡Hola! Soy la IA de APARTAoAPORTA. He leído todos los manuales de Luis. Pregúntame lo que quieras sobre el wifi, el parking, dónde comer o la historia del apartamento.</p>
                </div>
            </div>
        </div>

        <!-- Barra de entrada de texto -->
        <div class="p-4 bg-white border-t border-gray-200 shadow-2xl">
            <div class="flex items-center space-x-2 bg-gray-100 p-2 rounded-2xl border border-gray-200 focus-within:border-blue-400 transition-colors">
                <input type="text" id="user-input" class="flex-1 bg-transparent px-3 py-2 text-sm focus:outline-none" placeholder="Escribe tu duda aquí..." autocomplete="off">
                <button onclick="handleChat()" class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-blue-700 active:scale-90 transition">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <p class="text-[9px] text-gray-400 text-center mt-2 uppercase tracking-widest font-bold">Powered by Luis & Valeria Knowledge Base</p>
        </div>
    </div>

    <!-- BOTÓN WHATSAPP -->
    <a id="wa-button" href="#" target="_blank" class="fixed bottom-24 right-4 bg-green-500 text-white w-12 h-12 rounded-full hidden shadow-2xl z-50 items-center justify-center border-2 border-white">
        <i class="fab fa-whatsapp text-2xl"></i>
    </a>

    <script>
        let currentApt = "";
        let currentLang = "es";

        const translations = {
            es: {
                welcome: "¡Hola! Soy tu asistente inteligente. Pregúntame sobre el parking, wifi, basura o dónde cenar.",
                placeholder: "Escribe tu duda...",
                typing: "La IA está pensando...",
                aptLabel: "Loft ",
                waMsg: "Hola Luis, estoy usando el Asistente del Loft "
            },
            en: {
                welcome: "Hi! I'm your AI assistant. Ask me about parking, wifi, trash or where to eat.",
                placeholder: "Type your question...",
                typing: "AI is thinking...",
                aptLabel: "Loft ",
                waMsg: "Hi Luis, I'm using the AI Assistant from Loft "
            }
            // (Añadir FR y CA siguiendo el mismo esquema)
        };

        // BASE DE DATOS DE INTELIGENCIA (Extraída de tus fuentes)
        const knowledgeBase = [
            { keys: ['wifi', 'internet', 'clave', 'contraseña', 'password'], 
              ans: "La red es **apartaoaporta** y la clave es **2020v@leria**. Tienes conexión de alta velocidad en todo el loft [5]." },
            { keys: ['parking', 'aparcamiento', 'coche', 'cepo', 'vehiculo'], 
              ans: "El parking es comunitario en el Edificio Fluromar II. Usa la llave maestra de tu llavero para abrir cualquier cepo libre. **Nota importante:** En agosto hay mucha demanda, si aparcas, ¡mejor no muevas el coche! [2, 6]." },
            { keys: ['llaves', 'entrar', 'acceder', 'codigo', 'caja'], 
              ans: "Las llaves están en la caja de seguridad junto al portal. Te envié el código por la app de reserva. Es un sistema de llegada autónoma disponible 24h [2, 7]." },
            { keys: ['basura', 'reciclar', 'contenedor', 'limpieza'], 
              ans: "Hay contenedores de reciclaje (verde, azul, amarillo y ropa) justo enfrente del portal del edificio. Se pide tirarla al salir [1, 2]." },
            { keys: ['comer', 'hambre', 'restaurante', 'cena', 'pirata', 'hamburguesa', 'pizza'], 
              ans: "Luis te recomienda: \n1. **Brasería El Pirata** (debajo del edificio): Especialistas en costillas [3]. \n2. **La Tagliatella**: Su italiano preferido frente al mar [8]. \n3. **Wissler**: Mejores burgers gourmet [9]. \n4. **Pizza Taura**: Para pedir a domicilio al 977394984 [10]." },
            { keys: ['historia', 'valeria', 'origen', 'quien'], 
              ans: "APARTAoAPORTA nació en 2020. Luis buscaba un refugio para disfrutar del mar con su hija Valeria sin los engorros de la arena. Reformó los 3 lofts con todo el lujo tecnológico (Ambilight, Hue RGB) para que te sientas como en casa [4]." },
            { keys: ['tele', 'tv', 'ambilight', 'netflix', 'sony'], 
              ans: "Todos los lofts tienen Smart TV Sony con sistema **Ambilight**. El Loft 210 tiene una de 65\" y los 211/212 de 55\". Puedes usar tus cuentas de streaming, pero recuerda borrarlas al salir [11]." },
            { keys: ['piscina', 'baño', 'nadar', 'horario'], 
              ans: "La piscina comunitaria está abierta de **10:00 a 22:00**. Es una piscina grande y tranquila ideal para relajarse [2]." },
            { keys: ['normas', 'fumar', 'mascotas', 'perro'], 
              ans: "Está estrictamente **prohibido fumar** dentro del apartamento y **no se aceptan mascotas** para garantizar la higiene de todos los huéspedes [2, 12]." },
            { keys: ['taxi', 'transporte', 'autobus', 'bus'], 
              ans: "Para Taxis llama al **977 38 50 50** (Salou) [13]. Hay una parada de autobús a 5 min andando con conexión a PortAventura y aeropuertos [2]." }
        ];

        function initApp(apt) {
            currentApt = apt;
            document.getElementById('selector-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('wa-button').classList.remove('hidden');
            document.getElementById('apt-status').innerText = translations[currentLang].aptLabel + apt;
            updateLanguage();
        }

        function handleChat() {
            const input = document.getElementById('user-input');
            const text = input.value.trim().toLowerCase();
            if (!text) return;

            addMessage(input.value, 'user');
            input.value = "";

            // Efecto de "Pensando..."
            const typingId = addMessage('<span class="typing-dot">.</span><span class="typing-dot">.</span><span class="typing-dot">.</span>', 'bot');

            setTimeout(() => {
                let response = "No estoy seguro de entenderte. Prueba preguntando por el 'wifi', el 'parking', 'dónde comer' o 'la historia' del edificio.";
                
                // Motor de IA simplificado: Búsqueda de coincidencia múltiple
                for (const item of knowledgeBase) {
                    if (item.keys.some(key => text.includes(key))) {
                        response = item.ans;
                        break;
                    }
                }
                
                removeMessage(typingId);
                addMessage(response, 'bot');
            }, 800);
        }

        function addMessage(text, side) {
            const id = Date.now();
            const win = document.getElementById('chat-window');
            const msgDiv = document.createElement('div');
            msgDiv.id = id;
            msgDiv.className = side === 'bot' ? 'flex flex-col items-start' : 'flex flex-col items-end';
            
            const color = side === 'bot' ? 'bg-blue-600 text-white bot-bubble shadow-md' : 'bg-gray-200 text-gray-800 user-bubble';
            
            msgDiv.innerHTML = `<div class="${color} p-3 text-sm max-w-[85%]">${text}</div>`;
            win.appendChild(msgDiv);
            win.scrollTop = win.scrollHeight;
            return id;
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function updateLanguage() {
            currentLang = document.getElementById('lang-selector').value;
            const t = translations[currentLang] || translations['es'];
            document.getElementById('user-input').placeholder = t.placeholder;
            
            const phone = "34617635544";
            const msg = encodeURIComponent(t.waMsg + currentApt);
            document.getElementById('wa-button').href = `https://wa.me/${phone}?text=${msg}`;
        }

        // Enviar con Enter
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleChat();
        });
    </script>
</body>
</html>
