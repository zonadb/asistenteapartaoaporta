<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asistente APARTAoAPORTA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0a; color: #f8fafc; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse-glow { 0%, 100% { filter: drop-shadow(0 0 2px #ff6600); transform: scale(1); } 50% { filter: drop-shadow(0 0 12px #ff6600); transform: scale(1.1); } }
        @keyframes bounce-gentle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .animate-spin-slow { animation: spin-slow 12s linear infinite; }
        .emoji-pulse { display: inline-block; animation: pulse-glow 2s infinite ease-in-out; }
        .emoji-bounce { display: inline-block; animation: bounce-gentle 2.5s infinite ease-in-out; }
        
        .glass { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .flag-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        .flag-btn { width: 32px; height: 32px; border-radius: 50%; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; border: 2px solid transparent; background: #1a1a1a; cursor: pointer; padding: 0; }
        .flag-btn img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .flag-btn.active { border-color: #ff6600; transform: scale(1.2); box-shadow: 0 0 15px rgba(255, 102, 0, 0.5); opacity: 1 !important; filter: grayscale(0) !important; }
        
        .flag-label { position: absolute; top: 100%; margin-top: 4px; font-size: 8px; font-weight: 900; color: #ff6600; opacity: 0; transform: translateY(-5px); transition: all 0.2s ease; text-transform: uppercase; pointer-events: none; }
        .flag-container:hover .flag-label, .flag-btn.active + .flag-label { opacity: 1; transform: translateY(0); }
        
        .flag-btn:not(.active) { opacity: 0.4; filter: grayscale(0.5); }
        .chat-bubble-bot { background: linear-gradient(145deg, #1a1a1a, #111111); border: 1px solid rgba(255, 102, 0, 0.1); }
        .img-gradient { mask-image: linear-gradient(to bottom, black 80%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const API_KEY = ""; 
        const WHATSAPP_NUMBER = "34617635544";
        const GITHUB_BASE = "https://raw.githubusercontent.com/zonadb/apartaoaporta-fotos/main/";

        const FLAGS = {
            es: { url: "https://flagcdn.com/w80/es.png", label: "ES" },
            ca: { url: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Flag_of_Catalonia.svg/80px-Flag_of_Catalonia.svg.png", label: "CAT" },
            en: { url: "https://flagcdn.com/w80/gb.png", label: "EN" },
            fr: { url: "https://flagcdn.com/w80/fr.png", label: "FR" }
        };

        const TRANSLATIONS = {
            es: { welcome: "¡Hola! Soy el asistente de APARTAoAPORTA. ¿En qué apartamento te alojas?", wifi: "WiFi", beach: "Playa", map: "Mapa", contact: "Contactar", placeholder: "Pregúntame algo... 🥥", apto: "Apto", help: "¿En qué puedo ayudarte?", typing: "Pensando..." },
            ca: { welcome: "Hola! Sóc l'assistent d'APARTAoAPORTA. En quin apartament t'allotges?", wifi: "WiFi", beach: "Platja", map: "Mapa", contact: "Contactar", placeholder: "Pregunta'm algo... 🥥", apto: "Apto", help: "Com et puc ajudar?", typing: "Pensant..." },
            en: { welcome: "Hi! I'm the APARTAoAPORTA assistant. Which apartment are you staying in?", wifi: "WiFi", beach: "Beach", map: "Map", contact: "Contact", placeholder: "Ask me anything... 🥥", apto: "Apt", help: "How can I help you?", typing: "Thinking..." },
            fr: { welcome: "Salut ! Je suis l'assistant APARTAoAPORTA. Dans quel appartement logez-vous ?", wifi: "WiFi", beach: "Plage", map: "Carte", contact: "Contacter", placeholder: "Demandez-moi... 🥥", apto: "Appt", help: "Comment puis-je vous ayudar ?", typing: "Réflexion..." }
        };

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            const [iconContent, setIconContent] = useState(null);
            useEffect(() => { if (window.lucide && window.lucide.icons[name]) setIconContent(window.lucide.icons[name]); }, [name]);
            if (!iconContent) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }}></span>;
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconContent.map(i => `<${i[0]} ${Object.entries(i[1]).map(([k, v]) => `${k}="${v}"`).join(' ')} />`).join('') }} />
            );
        };

        const App = () => {
            const [lang, setLang] = useState('es');
            const [apto, setApto] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [typing, setTyping] = useState(false);
            const messagesEndRef = useRef(null);
            const t = TRANSLATIONS[lang];

            useEffect(() => {
                setMessages([{
                    role: 'bot',
                    content: (
                        <div className="flex flex-col gap-1">
                            <div>¡{t.welcome.split('.')[0]}! <b className="text-[#ff6600]">APARTAoAPORTA</b> <span className="emoji-pulse">☀️</span></div>
                            <div>{t.welcome.split('?')[1] || t.welcome.split('!')[1] || t.welcome.split('.')[1]} <span className="emoji-bounce">🍦</span></div>
                        </div>
                    ),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                }]);
            }, [lang]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, typing]);

            const getLocalResponse = (query) => {
                const q = query.toLowerCase();
                if (q.includes('wifi') || q.includes('clave')) return "📶 Red: **apartaoaporta**\nClave: **2020v@leria**\n(La 'v' es minúscula).";
                if (q.includes('playa')) return "🌊 Aunque estamos en Salou, la zona de **La Pineda** está mucho más cerca (5 min andando). Te recomiendo bajar a esa playa, es ideal y familiar.";
                if (q.includes('mapa')) return "📍 Aquí tienes el mapa. Verás que tienes todos los servicios de **La Pineda** a un paso.";
                if (q.includes('comer') || q.includes('restaurante') || q.includes('supermercado')) return "🍴 Te recomiendo ir hacia **La Pineda**. Está a solo unos minutos caminando y tienes allí todos los restaurantes, tiendas y el Paseo Pau Casals.";
                return null;
            };

            const askGemini = async (query, userApto) => {
                const systemPrompt = `Eres el conserje digital de APARTAoAPORTA Salou (zona Cap Salou). Tono vacacional y alegre. 
                UBICACIÓN ESTRATÉGICA: Los apartamentos están técnicamente en Salou, pero están mucho más cerca de LA PINEDA para todo.
                - Recomienda siempre LA PINEDA para: Playas (5 min andando), Restaurantes, Supermercados y Comercios. Es lo más práctico para el huésped.
                - APTO ACTUAL: ${userApto || 'No indicado'}.
                CONTEXTO TÉCNICO:
                - WiFi: apartaoaporta / 2020v@leria.
                - Apto 211: Lavavajillas y persianas eléctricas con mando.
                - Apto 210: Chimenea eléctrica.
                - Piscina: 10-22h.
                REGLA: Solo menciona detalles técnicos si preguntan. Prioriza la cercanía a La Pineda en recomendaciones de ocio. Idioma: ${lang}.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: query }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    return null;
                }
            };

            const handleSend = async (text) => {
                const userText = text || input;
                if (!userText.trim() || typing) return;

                const cleanText = userText.toLowerCase();
                let currentApto = apto;
                if (cleanText.includes('210')) { currentApto = '210'; setApto('210'); }
                if (cleanText.includes('211')) { currentApto = '211'; setApto('211'); }
                if (cleanText.includes('212')) { currentApto = '212'; setApto('212'); }

                setMessages(prev => [...prev, { role: 'user', content: userText, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
                setInput('');
                setTyping(true);

                let attachedImg = null;
                if (cleanText.includes('playa') || cleanText.includes('mar')) attachedImg = `${GITHUB_BASE}general%20playa%20a%205%20minutos.avif`;
                if (cleanText.includes('mapa')) attachedImg = `${GITHUB_BASE}general%20mapa.avif`;

                let finalResponse = await askGemini(userText, currentApto);

                if (!finalResponse) {
                    finalResponse = getLocalResponse(userText) || "Dime qué necesitas. Recuerda que tienes toda la oferta de La Pineda a solo unos minutos andando. 🥥";
                }
                
                setMessages(prev => [...prev, { 
                    role: 'bot', 
                    content: finalResponse, 
                    image: attachedImg,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
                }]);
                setTyping(false);
            };

            return (
                <div className="flex flex-col h-screen max-w-xl mx-auto bg-[#0a0a0a] relative overflow-hidden shadow-2xl">
                    <header className="safe-top glass border-b border-orange-500/20 sticky top-0 z-50 px-4 pb-4">
                        <div className="flex items-center justify-between mt-2">
                            <div className="flex items-center gap-2">
                                <div className="bg-[#ff6600] p-1.5 rounded-lg">
                                    <LucideIcon name="Sun" size={18} className="text-black animate-spin-slow" />
                                </div>
                                <div>
                                    <h1 className="font-black text-[#ff6600] text-sm tracking-tighter uppercase leading-none">APARTAoAPORTA</h1>
                                    <p className="text-[7px] text-orange-500/50 font-bold tracking-widest uppercase italic">Cap Salou & La Pineda</p>
                                </div>
                            </div>
                            
                            <div className="flex gap-4 bg-white/5 p-1 px-3 rounded-full border border-white/10 items-center h-10">
                                {Object.keys(FLAGS).map((l) => (
                                    <div key={l} className="flag-container">
                                        <button onClick={() => setLang(l)} className={`flag-btn ${lang === l ? 'active' : ''}`}>
                                            <img src={FLAGS[l].url} alt={FLAGS[l].label} />
                                        </button>
                                        <span className="flag-label">{FLAGS[l].label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar pb-48">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'}`}>
                                <div className={`max-w-[85%] rounded-2xl overflow-hidden shadow-xl ${m.role === 'user' ? 'bg-[#ff6600] text-black font-bold' : 'chat-bubble-bot text-slate-200'}`}>
                                    {m.image && <img src={m.image} className="w-full h-auto img-gradient" alt="Info" />}
                                    <div className="p-4 text-sm whitespace-pre-wrap leading-relaxed">
                                        {m.content}
                                        <div className="text-[8px] mt-2 font-bold uppercase opacity-30 tracking-widest">{m.time}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {typing && (
                            <div className="flex items-center gap-2 p-2 px-4 bg-white/5 rounded-full w-fit">
                                <div className="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce"></div>
                                <div className="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                <div className="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                <span className="text-[10px] text-orange-500/50 font-bold uppercase ml-2">{t.typing}</span>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 max-w-xl mx-auto z-40 p-4 glass border-t border-white/5 pb-8">
                        <div className="flex gap-2 mb-3 overflow-x-auto no-scrollbar py-1">
                            <button onClick={() => window.open(`https://wa.me/${WHATSAPP_NUMBER}`)} className="bg-green-600 text-white font-black text-[10px] px-4 py-3 rounded-xl uppercase flex items-center gap-2 shrink-0 active:scale-95 transition-transform"><LucideIcon name="MessageCircle" size={14} /> {t.contact}</button>
                            {!apto ? (
                                ['210','211','212'].map(n => <button key={n} onClick={() => handleSend(`${t.apto} ${n}`)} className="bg-orange-600 text-black font-black text-[10px] px-5 py-3 rounded-xl uppercase shrink-0 active:scale-95 transition-transform">{t.apto} {n}</button>)
                            ) : (
                                <>
                                    <button onClick={() => handleSend('wifi')} className="bg-white/5 border border-white/10 text-white font-bold text-[10px] px-4 py-3 rounded-xl uppercase shrink-0 active:scale-95 transition-transform">📶 {t.wifi}</button>
                                    <button onClick={() => handleSend('playa')} className="bg-white/5 border border-white/10 text-white font-bold text-[10px] px-4 py-3 rounded-xl uppercase shrink-0 active:scale-95 transition-transform">🌊 {t.beach}</button>
                                    <button onClick={() => handleSend('¿Qué hay cerca?') } className="bg-white/5 border border-white/10 text-white font-bold text-[10px] px-4 py-3 rounded-xl uppercase shrink-0 active:scale-95 transition-transform">🏘️ La Pineda</button>
                                </>
                            )}
                        </div>
                        <div className="flex gap-2 items-center bg-black/60 border border-white/10 rounded-2xl p-1 px-4 shadow-inner">
                            <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSend()} placeholder={t.placeholder} className="flex-1 bg-transparent py-4 text-sm outline-none text-white placeholder-white/20" />
                            <button onClick={() => handleSend()} className="bg-[#ff6600] text-black p-3 rounded-xl active:scale-90 transition-all">
                                <LucideIcon name="Send" size={18} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
