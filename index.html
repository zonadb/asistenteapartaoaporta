<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asistente APARTAoAPORTA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0a; color: #f8fafc; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 12s linear infinite; }
        
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .flag-btn { width: 28px; height: 28px; border-radius: 50%; transition: all 0.3s ease; overflow: hidden; border: 1.5px solid transparent; opacity: 0.4; }
        .flag-btn.active { border-color: #ff6600; transform: scale(1.1); opacity: 1; }
        
        .chat-bubble-bot { background: linear-gradient(145deg, #1a1a1a, #111111); border: 1px solid rgba(255, 102, 0, 0.08); }
        .img-gradient { mask-image: linear-gradient(to bottom, black 85%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%); }
        
        .action-btn { transition: all 0.2s ease; border: 1px solid rgba(255, 255, 255, 0.05); }
        .action-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const API_KEY = ""; 
        const WHATSAPP_NUMBER = "34617635544";
        const GITHUB_BASE = "https://raw.githubusercontent.com/zonadb/apartaoaporta-fotos/main/";

        const DATA_FIXED = {
            checkIn: "14:00h",
            checkOut: "11:00h",
            wifiRed: "apartaoaporta",
            wifiClave: "2020v@leria",
            pool: "10:00h a 22:00h",
            location: "Estamos en Cap Salou, pero la playa y comercios de La Pineda están a solo 5 min andando."
        };

        const FLAGS = {
            es: { url: "https://flagcdn.com/w80/es.png", label: "ES" },
            ca: { url: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Flag_of_Catalonia.svg/80px-Flag_of_Catalonia.svg.png", label: "CAT" },
            en: { url: "https://flagcdn.com/w80/gb.png", label: "EN" },
            fr: { url: "https://flagcdn.com/w80/fr.png", label: "FR" }
        };

        const TRANSLATIONS = {
            es: { welcome: "¡Hola! Bienvenido a APARTAoAPORTA. Selecciona tu apartamento para empezar:", wifi: "WiFi", beach: "Playa", map: "Mapa", contact: "WhatsApp", placeholder: "Escribe aquí...", apto: "Apto", typing: "Consultando...", hours: "Horas" },
            ca: { welcome: "Hola! Benvingut a APARTAoAPORTA. Selecciona el teu apartament per començar:", wifi: "WiFi", beach: "Platja", map: "Mapa", contact: "WhatsApp", placeholder: "Escriu aquí...", apto: "Apto", typing: "Consultant...", hours: "Horaris" },
            en: { welcome: "Hi! Welcome to APARTAoAPORTA. Select your apartment to start:", wifi: "WiFi", beach: "Beach", map: "Map", contact: "WhatsApp", placeholder: "Type here...", apto: "Apt", typing: "Checking...", hours: "Hours" },
            fr: { welcome: "Salut ! Bienvenue chez APARTAoAPORTA. Sélectionnez votre appartement pour commencer :", wifi: "WiFi", beach: "Plage", map: "Carte", contact: "WhatsApp", placeholder: "Écrivez ici...", apto: "Appt", typing: "Vérification...", hours: "Heures" }
        };

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            const [iconContent, setIconContent] = useState(null);
            useEffect(() => { if (window.lucide && window.lucide.icons[name]) setIconContent(window.lucide.icons[name]); }, [name]);
            if (!iconContent) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }}></span>;
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconContent.map(i => `<${i[0]} ${Object.entries(i[1]).map(([k, v]) => `${k}="${v}"`).join(' ')} />`).join('') }} />
            );
        };

        const App = () => {
            const [lang, setLang] = useState('es');
            const [apto, setApto] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [typing, setTyping] = useState(false);
            const messagesEndRef = useRef(null);
            const t = TRANSLATIONS[lang];

            useEffect(() => {
                setMessages([{
                    role: 'bot',
                    content: t.welcome,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                }]);
            }, [lang]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, typing]);

            const getLocalResponse = (query) => {
                const q = query.toLowerCase();
                if (q.includes('wifi') || q.includes('clave') || q.includes('internet')) 
                    return `📶 **WiFi:**\nRed: **${DATA_FIXED.wifiRed}**\nClave: **${DATA_FIXED.wifiClave}**\n(La 'v' es minúscula).`;
                if (q.includes('hora') || q.includes('entrada') || q.includes('salida') || q.includes('check') || q.includes('horarios')) 
                    return `⏰ **Horarios Oficiales:**\n\n🏠 **Entrada:** A partir de las **${DATA_FIXED.checkIn}**.\n🚪 **Salida:** Antes de las **${DATA_FIXED.checkOut}**.`;
                if (q.includes('playa') || q.includes('pineda') || q.includes('cerca') || q.includes('comer')) 
                    return `🏘️ **Zona La Pineda:**\n${DATA_FIXED.location}\n\nRecomendamos la playa de La Pineda por ser amplia y tener todos los servicios a mano.`;
                return null;
            };

            const askGemini = async (query, userApto) => {
                const systemPrompt = `Eres el asistente de APARTAoAPORTA Salou. 
                NO INVENTES NADA. Si no sabes algo, remite a WhatsApp.
                DATOS REALES:
                - Entrada: ${DATA_FIXED.checkIn}.
                - Salida: ${DATA_FIXED.checkOut}.
                - WiFi: ${DATA_FIXED.wifiRed} / ${DATA_FIXED.wifiClave}.
                - Ubicación: Muy cerca de La Pineda (5 min andando).
                - Apto 211: Lavavajillas y persianas con mando.
                - Apto 210: Chimenea eléctrica.
                - Piscina: ${DATA_FIXED.pool}.
                Responde siempre breve y en idioma ${lang}.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: query }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) { return null; }
            };

            const handleSend = async (text, isAptoSelection = false) => {
                const userText = text || input;
                if (!userText.trim() || typing) return;

                const cleanText = userText.toLowerCase();
                let selectedApto = apto;
                
                if (isAptoSelection) {
                    selectedApto = text.split(' ')[1];
                    setApto(selectedApto);
                }

                setMessages(prev => [...prev, { role: 'user', content: userText, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
                setInput('');
                setTyping(true);

                let finalResponse = getLocalResponse(userText);
                let attachedImg = null;

                if (cleanText.includes('playa')) attachedImg = `${GITHUB_BASE}general%20playa%20a%205%20minutos.avif`;
                if (cleanText.includes('mapa')) attachedImg = `${GITHUB_BASE}general%20mapa.avif`;

                if (!finalResponse) finalResponse = await askGemini(userText, selectedApto);
                if (!finalResponse) finalResponse = "No tengo ese dato ahora mismo. Por favor, pulsa el botón de WhatsApp para que te ayudemos personalmente. 📲";
                
                setMessages(prev => [...prev, { 
                    role: 'bot', 
                    content: isAptoSelection ? `¡Entendido! Estás en el **Apto ${selectedApto}**. ¿En qué puedo ayudarte?` : finalResponse, 
                    image: attachedImg,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
                }]);
                setTyping(false);
            };

            return (
                <div className="flex flex-col h-screen max-w-xl mx-auto bg-[#0a0a0a] relative overflow-hidden border-x border-white/5 shadow-2xl">
                    <header className="safe-top glass border-b border-orange-500/10 sticky top-0 z-50 px-4 py-3 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="bg-[#ff6600] p-1.5 rounded-lg shadow-lg shadow-orange-600/20">
                                <LucideIcon name="Sun" size={16} className="text-black animate-spin-slow" />
                            </div>
                            <div>
                                <h1 className="font-black text-[#ff6600] text-xs tracking-tighter uppercase leading-none">APARTAoAPORTA</h1>
                                <p className="text-[7px] text-orange-500/50 font-bold uppercase tracking-widest italic">Guest Assistant</p>
                            </div>
                        </div>
                        <div className="flex gap-1.5 bg-white/5 p-1 rounded-full border border-white/5">
                            {Object.keys(FLAGS).map((l) => (
                                <button key={l} onClick={() => setLang(l)} className={`flag-btn ${lang === l ? 'active' : ''}`}>
                                    <img src={FLAGS[l].url} alt={FLAGS[l].label} className="w-full h-full object-cover" />
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-52">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'}`}>
                                <div className={`max-w-[88%] rounded-2xl overflow-hidden shadow-lg ${m.role === 'user' ? 'bg-[#ff6600] text-black font-semibold' : 'chat-bubble-bot text-slate-200'}`}>
                                    {m.image && <img src={m.image} className="w-full h-auto img-gradient" />}
                                    <div className="p-3 text-sm whitespace-pre-wrap">
                                        {m.content}
                                        <div className="text-[8px] mt-1.5 font-bold uppercase opacity-25 tracking-widest">{m.time}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {typing && (
                            <div className="flex items-center gap-2 p-2 px-3 bg-white/5 rounded-full w-fit">
                                <div className="w-1 h-1 bg-orange-500 rounded-full animate-bounce"></div>
                                <div className="w-1 h-1 bg-orange-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                <span className="text-[9px] text-orange-500/50 font-bold uppercase ml-1">{t.typing}</span>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 max-w-xl mx-auto z-40 p-3 glass border-t border-white/5 pb-8">
                        {/* FILA 1: Apartamentos */}
                        <div className="flex gap-2 mb-2 overflow-x-auto no-scrollbar">
                            {['210', '211', '212'].map(n => (
                                <button 
                                    key={n} 
                                    onClick={() => handleSend(`${t.apto} ${n}`, true)} 
                                    className={`action-btn flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase border ${apto === n ? 'bg-[#ff6600] text-black border-[#ff6600]' : 'bg-white/5 text-orange-500 border-white/10'}`}
                                >
                                    {t.apto} {n}
                                </button>
                            ))}
                        </div>
                        
                        {/* FILA 2: Servicios y WhatsApp */}
                        <div className="flex gap-2 mb-3">
                            <button onClick={() => handleSend('wifi')} className="action-btn bg-white/5 border border-white/10 text-white font-bold text-[9px] px-3 py-2.5 rounded-xl uppercase flex-1">📶 {t.wifi}</button>
                            <button onClick={() => handleSend('horarios')} className="action-btn bg-white/5 border border-white/10 text-white font-bold text-[9px] px-3 py-2.5 rounded-xl uppercase flex-1">⏰ {t.hours}</button>
                            <button onClick={() => handleSend('playa')} className="action-btn bg-white/5 border border-white/10 text-white font-bold text-[9px] px-3 py-2.5 rounded-xl uppercase flex-1">🌊 {t.beach}</button>
                            <button onClick={() => window.open(`https://wa.me/${WHATSAPP_NUMBER}`)} className="action-btn bg-green-600/90 text-white font-black text-[9px] px-4 py-2.5 rounded-xl uppercase flex items-center justify-center gap-1.5 shadow-lg shadow-green-900/20 active:bg-green-500">
                                <LucideIcon name="MessageCircle" size={14} /> {t.contact}
                            </button>
                        </div>
                        
                        {/* Input de texto */}
                        <div className="flex gap-2 items-center bg-black/40 border border-white/5 rounded-2xl p-1 px-3">
                            <input 
                                value={input} 
                                onChange={(e) => setInput(e.target.value)} 
                                onKeyDown={(e) => e.key === 'Enter' && handleSend()} 
                                placeholder={t.placeholder} 
                                className="flex-1 bg-transparent py-3 text-sm outline-none text-white placeholder-white/10" 
                            />
                            <button onClick={() => handleSend()} className="bg-[#ff6600] text-black p-2.5 rounded-xl active:scale-90 transition-all">
                                <LucideIcon name="Send" size={16} />
                            </button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
