<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asistente APARTAoAPORTA</title>
    
    <!-- Configuración PWA Personalizada -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AsistenteAP">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/zonadb/apartaoaporta-fotos/main/210-apartamento%20general.avif">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0a0a0a; 
            color: #f8fafc;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animaciones con Emojis */
        @keyframes shine {
            0%, 100% { filter: drop-shadow(0 0 2px #ff6600); transform: scale(1); }
            50% { filter: drop-shadow(0 0 15px #ff6600); transform: scale(1.1); }
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes wave {
            0%, 100% { transform: rotate(0) translateX(0); }
            25% { transform: rotate(-10deg) translateX(-2px); }
            75% { transform: rotate(10deg) translateX(2px); }
        }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .emoji-sun { display: inline-block; animation: shine 2.5s infinite ease-in-out; }
        .emoji-ice { display: inline-block; animation: pulse-soft 2s infinite ease-in-out; }
        .emoji-wave { display: inline-block; animation: wave 2.5s infinite ease-in-out; }
        .animate-spin-slow { animation: spin-slow 15s linear infinite; }
        
        .glass { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .img-gradient { mask-image: linear-gradient(to bottom, black 80%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%); }
        
        .safe-top { padding-top: calc(var(--sat) + 0.5rem); }
        .safe-bottom { padding-bottom: calc(var(--sab) + 0.5rem); }

        .chat-bubble-bot { background: linear-gradient(145deg, #1a1a1a, #111111); border: 1px solid rgba(255, 102, 0, 0.1); }
        .chat-bubble-user { background: linear-gradient(145deg, #ff6600, #e65c00); box-shadow: 0 4px 15px rgba(255, 102, 0, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const GITHUB_RAW_BASE = "https://raw.githubusercontent.com/zonadb/apartaoaporta-fotos/main/";
        const WHATSAPP_NUMBER = "34617635544";

        const MAPA_FOTOS = {
            "210": { "GENERAL": "210-apartamento%20general.avif" },
            "211": { "GENERAL": "211-entrada.avif" },
            "212": { "GENERAL": "212-general.avif" },
            "COMUN": { 
                "MAPA": "general%20mapa.avif", 
                "PLAYA": "general%20playa%20a%205%20minutos.avif",
                "PISCINA": "general-piscina%20frontal.avif"
            }
        };

        const getFullUrl = (path) => path ? `${GITHUB_RAW_BASE}${path}` : null;

        const AnimatedEmoji = ({ children, type }) => {
            const classes = { sun: 'emoji-sun', ice: 'emoji-ice', wave: 'emoji-wave' };
            return <span className={classes[type] || ''}>{children}</span>;
        };

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const [iconContent, setIconContent] = useState(null);
            useEffect(() => { if (window.lucide && window.lucide.icons[name]) setIconContent(window.lucide.icons[name]); }, [name]);
            if (!iconContent) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }}></span>;
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconContent.map(i => `<${i[0]} ${Object.entries(i[1]).map(([k, v]) => `${k}="${v}"`).join(' ')} />`).join('') }} />
            );
        };

        const API_KEY = ""; 

        const App = () => {
            const [apto, setApto] = useState(null);
            const [messages, setMessages] = useState([{
                role: 'bot',
                content: (
                    <>¡Hola! Soy el asistente de <b>APARTAoAPORTA</b> <AnimatedEmoji type="sun">☀️</AnimatedEmoji>.<br/><br/>¿En qué apartamento te alojas hoy? <AnimatedEmoji type="ice">🍦</AnimatedEmoji></>
                ),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            }]);
            const [input, setInput] = useState('');
            const [typing, setTyping] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, typing]);

            const callAI = async (query) => {
                try {
                    const systemPrompt = `Eres el asistente oficial de APARTAoAPORTA Salou. Tono: vacacional, alegre y servicial.
                    - Red WiFi: apartaoaporta / Clave: 2020v@leria.
                    - Playa: a 5 min andando.
                    - Piscina: abierta de 10:00 a 22:00.
                    - Apartamento 210: Chimenea eléctrica y Ambilight.
                    - Apartamento 211: Lavavajillas y persianas con mando.
                    - Apartamento 212: Luces RGB.
                    - Responde de forma muy breve e incluye emojis veraniegos.`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: query }] }], systemInstruction: { parts: [{ text: systemPrompt }] } })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) { return "¡Escríbeme y te ayudo con tu estancia! 🌴"; }
            };

            const handleSend = async (text) => {
                const val = text || input;
                if (!val.trim() || typing) return;

                let welcomeMsg = null;
                let welcomeImage = null;

                if (val.includes('210')) { setApto('210'); welcomeMsg = "¡Bienvenido al 210! ✨ Disfruta de la chimenea eléctrica y el Ambilight."; welcomeImage = getFullUrl(MAPA_FOTOS["210"].GENERAL); }
                else if (val.includes('211')) { setApto('211'); welcomeMsg = "¡Hola! Estás en el 211 🍽️. Recuerda que tienes lavavajillas y persianas automáticas."; welcomeImage = getFullUrl(MAPA_FOTOS["211"].GENERAL); }
                else if (val.includes('212')) { setApto('212'); welcomeMsg = "¡Genial! En el 212 tienes el mejor ambiente RGB para tus vacaciones 🌈."; welcomeImage = getFullUrl(MAPA_FOTOS["212"].GENERAL); }

                setMessages(prev => [...prev, { role: 'user', content: val, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
                setInput('');
                setTyping(true);

                const botReply = await callAI(val);
                setMessages(prev => [...prev, { 
                    role: 'bot', 
                    content: welcomeMsg || botReply, 
                    image: welcomeImage || (val.toLowerCase().includes('playa') ? getFullUrl(MAPA_FOTOS.COMUN.PLAYA) : val.toLowerCase().includes('mapa') ? getFullUrl(MAPA_FOTOS.COMUN.MAPA) : null), 
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
                }]);
                setTyping(false);
            };

            return (
                <div className="flex flex-col h-screen max-w-xl mx-auto bg-[#0a0a0a] relative overflow-hidden">
                    <header className="safe-top glass border-b border-orange-500/20 sticky top-0 z-30 px-4 pb-4">
                        <div className="flex items-center justify-between mt-2">
                            <div className="flex items-center gap-3">
                                <div className="bg-[#ff6600] p-2 rounded-xl shadow-lg shadow-orange-600/40"><LucideIcon name="Sun" className="text-black animate-spin-slow" /></div>
                                <div>
                                    <h1 className="font-black text-[#ff6600] text-lg uppercase tracking-tighter leading-none">APARTAoAPORTA</h1>
                                    <p className="text-[9px] text-orange-500/70 font-bold uppercase tracking-[0.2em]">Asistente Virtual <AnimatedEmoji type="wave">🌊</AnimatedEmoji></p>
                                </div>
                            </div>
                            {apto && <span className="text-[10px] font-black text-orange-500 bg-orange-500/10 px-3 py-1 rounded-full border border-orange-500/20">APTO {apto}</span>}
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar pb-40">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'}`}>
                                <div className={`max-w-[88%] rounded-2xl overflow-hidden shadow-2xl ${m.role === 'user' ? 'chat-bubble-user text-black font-bold' : 'chat-bubble-bot text-slate-200'}`}>
                                    {m.image && <img src={m.image} className="w-full h-auto img-gradient" alt="Vista apartamento" />}
                                    <div className="p-4 text-sm leading-relaxed">
                                        {m.content}
                                        <div className={`text-[8px] mt-2 font-bold uppercase opacity-40 ${m.role === 'user' ? 'text-black' : 'text-orange-500'}`}>{m.time}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {typing && <div className="flex gap-1.5 p-4 bg-white/5 rounded-2xl w-14 justify-center items-center"><div className="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce"></div><div className="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce [animation-delay:-0.2s]"></div><div className="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce [animation-delay:-0.4s]"></div></div>}
                        <div ref={messagesEndRef} />
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 max-w-xl mx-auto z-40">
                        <div className="px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar glass border-t border-white/5 items-center">
                            <button onClick={() => window.open(`https://wa.me/${WHATSAPP_NUMBER}`)} className="bg-green-600 text-white font-black text-[10px] px-4 py-3 rounded-xl uppercase flex items-center gap-2 shrink-0 shadow-lg active:scale-95 transition-transform">
                                <LucideIcon name="MessageCircle" size={14} /> Contactar
                            </button>
                            <div className="h-6 w-[1px] bg-white/10 shrink-0 mx-1"></div>
                            {!apto ? (
                                ['210','211','212'].map(n => <button key={n} onClick={() => handleSend(`Soy del ${n}`)} className="bg-orange-600 text-black font-black text-[10px] px-5 py-3 rounded-xl uppercase shrink-0 shadow-lg active:scale-95 transition-transform">Apto {n}</button>)
                            ) : (
                                <>
                                    <button onClick={() => handleSend("¿Cuál es el WiFi?")} className="bg-white/5 border border-white/10 text-white font-bold text-[10px] px-4 py-3 rounded-xl uppercase shrink-0 active:scale-95">📶 WiFi</button>
                                    <button onClick={() => handleSend("¿Dónde está la playa?")} className="bg-white/5 border border-white/10 text-white font-bold text-[10px] px-4 py-3 rounded-xl uppercase shrink-0 active:scale-95">🌊 Playa</button>
                                    <button onClick={() => handleSend("Ver mapa")} className="bg-white/5 border border-white/10 text-white font-bold text-[10px] px-4 py-3 rounded-xl uppercase shrink-0 active:scale-95">🗺️ Mapa</button>
                                </>
                            )}
                        </div>
                        <footer className="safe-bottom glass p-4">
                            <div className="flex gap-2 items-center bg-black/60 border border-white/10 rounded-2xl p-1 px-4 shadow-inner">
                                <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSend()} placeholder="Mensaje... 🥥" className="flex-1 bg-transparent py-4 text-sm outline-none text-white placeholder-white/20" />
                                <button onClick={() => handleSend()} className="bg-[#ff6600] text-black p-3 rounded-xl active:scale-90 transition-transform shadow-lg shadow-orange-600/20"><LucideIcon name="Send" size={18} /></button>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
